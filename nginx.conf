server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # ─── Compresión Gzip ───────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ─── Headers de Seguridad ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Caché de Assets Estáticos (JS, CSS, imágenes, fuentes) ─
    location ~* \.(?:css|js|map|jpe?g|png|gif|ico|svg|woff2?|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── React SPA: Fallback a index.html ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Desactivar acceso a archivos ocultos (.env, .git, etc.) ─
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
